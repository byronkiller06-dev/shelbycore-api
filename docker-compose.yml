services:
  db:
    image: pgvector/pgvector:pg16
    container_name: shelbycore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shelby
      POSTGRES_PASSWORD: shelby
      POSTGRES_DB: shelbycore
    ports:
      - "5432:5432"
    volumes:
      - shelby_pgdata:/var/lib/postgresql/data
volumes:
  shelby_pgdata:
